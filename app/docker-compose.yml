services:
  postgres:
    image: postgres:16-alpine
    container_name: cto_dashboard_postgres
    environment:
      POSTGRES_USER: cto
      POSTGRES_PASSWORD: cto
      POSTGRES_DB: cto_dashboard
    ports:
      - "55432:5432"
    volumes:
      - cto_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cto -d cto_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cto_dashboard_pgdata:
